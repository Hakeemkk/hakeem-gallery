version: '3.8'

services:
  # Frontend Container (Next.js - Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hakeem_frontend_dev
    restart: "no"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - hakeem_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # Backend Container (Node.js API - Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hakeem_backend_dev
    restart: "no"
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/hakeem_db
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - database
    networks:
      - hakeem_network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    command: npm run dev

  # Database Container (MongoDB - Development)
  database:
    image: mongo:7.0
    container_name: hakeem_database_dev
    restart: "no"
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=hakeem_db
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - hakeem_network

networks:
  hakeem_network:
    driver: bridge

volumes:
  mongo_dev_data:
    driver: local
  uploads_data:
    driver: local
